<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#06080f; overflow:hidden; width:100vw; height:100vh; font-family:'Inter',sans-serif; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .hud { position:absolute; top:8px; left:8px; right:8px; display:flex; justify-content:space-between; pointer-events:none; }
  .chip { background:rgba(0,0,0,0.65); border:1px solid rgba(96,165,250,0.25); border-radius:5px; padding:3px 8px; }
  .chip-l { font-size:6px; font-weight:700; letter-spacing:0.1em; color:rgba(96,165,250,0.7); text-transform:uppercase; }
  .chip-v { font-size:10px; font-weight:700; color:#60a5fa; }
  .bottom-stats { position:absolute; bottom:8px; left:8px; right:8px; display:flex; gap:5px; pointer-events:none; }
  .stat { flex:1; background:rgba(0,0,0,0.55); border:1px solid rgba(96,165,250,0.15); border-radius:5px; padding:4px 6px; }
  .stat-l { font-size:6px; color:rgba(96,165,250,0.6); font-weight:600; text-transform:uppercase; letter-spacing:0.07em; }
  .stat-v { font-size:11px; font-weight:700; color:#93c5fd; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div class="chip"><div class="chip-l">Meta · Ads ML</div><div class="chip-v">Feature Pipelines</div></div>
  <div class="chip"><div class="chip-l">Advertisers</div><div class="chip-v" id="adv">7M+</div></div>
</div>
<div class="bottom-stats">
  <div class="stat"><div class="stat-l">Revenue Impact</div><div class="stat-v">$100M+</div></div>
  <div class="stat"><div class="stat-l">Data Scale</div><div class="stat-v">Petabyte</div></div>
  <div class="stat"><div class="stat-l">Pipeline</div><div class="stat-v" id="tput">2.4M/s</div></div>
</div>
<script>
const c=document.getElementById('c');
const ctx=c.getContext('2d');
c.width=c.clientWidth||400; c.height=c.clientHeight||240;
const W=c.width,H=c.height;
let t=0;

// User segments: clusters
const CLUSTERS=[
  {cx:0.22,cy:0.42,r:0.09,label:'High-LTV',color:'#60a5fa',count:60},
  {cx:0.55,cy:0.35,r:0.07,label:'Re-engage',color:'#a78bfa',count:45},
  {cx:0.78,cy:0.55,r:0.08,label:'Lookalike',color:'#34d399',count:55},
  {cx:0.38,cy:0.65,r:0.06,label:'Retention',color:'#f472b6',count:35},
  {cx:0.68,cy:0.72,r:0.05,label:'New',color:'#fbbf24',count:25},
];

// Dots per cluster
const dots=[];
CLUSTERS.forEach(cl=>{
  for(let i=0;i<cl.count;i++){
    const a=Math.random()*Math.PI*2, r2=Math.random()*cl.r*0.85;
    dots.push({
      bx:cl.cx+r2*Math.cos(a), by:cl.cy+r2*Math.sin(a),
      x:Math.random(), y:Math.random(),
      color:cl.color, cluster:cl, vx:(Math.random()-0.5)*0.001, vy:(Math.random()-0.5)*0.001,
      phase:Math.random()*Math.PI*2
    });
  }
});

// Feature flow particles
const flows=[];
for(let i=0;i<20;i++) flows.push({x:Math.random(),y:0,speed:0.003+Math.random()*0.004,x2:Math.random()});

function lerp(a,b,t){return a+(b-a)*t;}

function draw(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#06080f'; ctx.fillRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='rgba(96,165,250,0.04)'; ctx.lineWidth=1;
  for(let x=0;x<W;x+=24){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=24){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  t+=0.012;
  const clusterizing = (Math.sin(t*0.3)+1)/2; // 0=scattered, 1=clustered

  // Feature flow from top
  flows.forEach(f=>{
    f.y=(f.y+f.speed)%1;
    const px=f.x2*W, py=f.y*H;
    ctx.fillStyle='rgba(96,165,250,0.4)';
    ctx.beginPath(); ctx.arc(px,py,1.5,0,Math.PI*2); ctx.fill();
    // Trail
    ctx.strokeStyle='rgba(96,165,250,0.1)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px,py-12); ctx.stroke();
  });

  // Dots cluster/scatter
  dots.forEach(d=>{
    const tx=lerp(d.x,d.bx,clusterizing);
    const ty=lerp(d.y,d.by,clusterizing);
    d.x+=d.vx; d.y+=d.vy;
    if(d.x<0||d.x>1)d.vx*=-1; if(d.y<0.1||d.y>0.9)d.vy*=-1;
    const px=lerp(d.x,tx,0.05)*W, py=lerp(d.y,ty,0.05)*H;
    const alpha=0.5+0.3*Math.sin(t+d.phase);
    ctx.fillStyle=d.color.replace(')',`,${alpha})`).replace('rgb','rgba');
    ctx.fillStyle=d.color+'99';
    ctx.beginPath(); ctx.arc(px,py,2,0,Math.PI*2); ctx.fill();
  });

  // Cluster labels + halos
  CLUSTERS.forEach(cl=>{
    const px=cl.cx*W, py=cl.cy*H;
    const r=(cl.r*W*(0.7+0.3*clusterizing));
    // Halo
    const grad=ctx.createRadialGradient(px,py,r*0.3,px,py,r);
    grad.addColorStop(0,cl.color+'22'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
    // Label
    if(clusterizing>0.4){
      ctx.fillStyle=cl.color; ctx.font=`bold 7px Inter`; ctx.textAlign='center';
      ctx.fillText(cl.label,px,py-r-3);
      ctx.textAlign='left';
    }
  });

  // Pipeline label
  ctx.fillStyle='rgba(96,165,250,0.4)'; ctx.font='6px Inter';
  ctx.fillText('USER SEGMENTATION MODEL',6,H*0.1+3);

  document.getElementById('tput').textContent=(2.2+0.4*Math.abs(Math.sin(t))).toFixed(1)+'M/s';
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
