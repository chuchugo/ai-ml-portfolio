<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#070d14; overflow:hidden; width:100vw; height:100vh; font-family:'Inter',sans-serif; }
  canvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .hud {
    position:absolute; top:8px; left:8px; right:8px;
    display:flex; justify-content:space-between; align-items:flex-start; pointer-events:none;
  }
  .hud-block { background:rgba(0,0,0,0.55); border:1px solid rgba(79,200,228,0.2); border-radius:5px; padding:4px 8px; }
  .hud-label { font-size:6px; font-weight:700; letter-spacing:0.1em; color:rgba(79,200,228,0.7); text-transform:uppercase; }
  .hud-val { font-size:11px; font-weight:700; color:#4fc8e4; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
  <div class="hud-block"><div class="hud-label">Honda R&D</div><div class="hud-val">Traffic AI</div></div>
  <div class="hud-block"><div class="hud-label">Prediction</div><div class="hud-val" id="acc">94.2%</div></div>
</div>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
function resize(){ c.width=c.clientWidth||400; c.height=c.clientHeight||240; }
resize();

const W=()=>c.width, H=()=>c.height;
let t=0;

// Roads: horizontal + vertical intersections
const roads = [
  {x1:0,y1:0.35,x2:1,y2:0.35},
  {x1:0,y1:0.65,x2:1,y2:0.65},
  {x1:0.3,y1:0,x2:0.3,y2:1},
  {x1:0.7,y1:0,x2:0.7,y2:1},
];

// Cars
const cars = [];
for(let i=0;i<14;i++){
  const horiz = Math.random()>0.5;
  cars.push({
    horiz,
    pos: Math.random(),
    lane: horiz ? (Math.random()>0.5 ? 0.35 : 0.65) : (Math.random()>0.5 ? 0.3 : 0.7),
    speed: (Math.random()*0.003+0.002)*(Math.random()>0.5?1:-1),
    color: `hsl(${190+Math.random()*40},80%,${55+Math.random()*20}%)`,
    predicted: Math.random()>0.5,
  });
}

// Waveform data
const wave = Array.from({length:60},(_,i)=>0.5+0.25*Math.sin(i*0.4));

function draw(){
  ctx.clearRect(0,0,W(),H());
  ctx.fillStyle='#070d14'; ctx.fillRect(0,0,W(),H());

  // Road grid
  ctx.lineWidth=8; ctx.strokeStyle='rgba(255,255,255,0.04)';
  roads.forEach(r=>{
    ctx.beginPath();
    ctx.moveTo(r.x1*W(),r.y1*H());
    ctx.lineTo(r.x2*W(),r.y2*H());
    ctx.stroke();
  });
  ctx.lineWidth=1; ctx.strokeStyle='rgba(255,255,255,0.06)';
  roads.forEach(r=>{
    ctx.setLineDash([6,6]);
    ctx.beginPath();
    ctx.moveTo(r.x1*W(),r.y1*H());
    ctx.lineTo(r.x2*W(),r.y2*H());
    ctx.stroke();
    ctx.setLineDash([]);
  });

  // Intersection glow
  [[0.3,0.35],[0.3,0.65],[0.7,0.35],[0.7,0.65]].forEach(([ix,iy])=>{
    const grad=ctx.createRadialGradient(ix*W(),iy*H(),2,ix*W(),iy*H(),22);
    grad.addColorStop(0,'rgba(79,200,228,0.18)'); grad.addColorStop(1,'transparent');
    ctx.fillStyle=grad; ctx.beginPath(); ctx.arc(ix*W(),iy*H(),22,0,Math.PI*2); ctx.fill();
  });

  // Cars
  t+=0.016;
  cars.forEach(car=>{
    car.pos=(car.pos+car.speed+1)%1;
    const x=car.horiz?car.pos*W():car.lane*W();
    const y=car.horiz?car.lane*H():car.pos*H();
    ctx.save();
    ctx.translate(x,y);
    if(!car.horiz) ctx.rotate(Math.PI/2);
    ctx.fillStyle=car.color;
    ctx.fillRect(-7,-3,14,6);
    if(car.predicted){
      ctx.strokeStyle='rgba(79,200,228,0.7)'; ctx.lineWidth=1;
      ctx.setLineDash([3,3]);
      // Prediction trail
      const ahead=car.speed>0?30:-30;
      ctx.beginPath(); ctx.moveTo(7,0); ctx.lineTo(7+ahead,0); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  });

  // Waveform (flow prediction) at bottom
  const wH=30, wY=H()-wH-4;
  ctx.strokeStyle='rgba(79,200,228,0.5)'; ctx.lineWidth=1.5;
  ctx.beginPath();
  wave.forEach((v,i)=>{
    const px=i/wave.length*W(), py=wY+v*wH;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  });
  ctx.stroke();
  // Animate wave
  wave.push(0.5+0.25*Math.sin(t*4)+0.1*Math.sin(t*7)); wave.shift();

  // Flow label
  ctx.fillStyle='rgba(79,200,228,0.5)'; ctx.font='6px Inter';
  ctx.fillText('TRAFFIC FLOW PREDICTION',4,wY-3);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
